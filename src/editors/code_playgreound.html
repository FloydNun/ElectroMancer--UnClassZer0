<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ElectroMancer Code Playground - UnClassZer0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs/loader.min.js"></script>
    <style>
      body {
        margin: 0;
        background: #1e1e1e;
        color: #ccc;
        font-family: system-ui;
        overflow: hidden;
      }
      #main {
        display: flex;
        height: 100vh;
      }
      #sidebar {
        width: 260px;
        background: #252526;
        padding: 10px;
        overflow-y: auto;
        border-right: 1px solid #333;
      }
      #sidebar h3 {
        margin: 0 0 10px 0;
        color: #007acc;
      }
      .file-item {
        padding: 6px 10px;
        cursor: pointer;
        border-radius: 3px;
      }
      .file-item:hover {
        background: #2a2d2e;
      }
      .file-item.active {
        background: #007acc;
        color: white;
      }
      #editor-area {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .toolbar {
        background: #007acc;
        padding: 10px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #monaco {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <!-- Sidebar File List -->
      <div id="sidebar">
        <h3>📁 OUTBOX (click to edit)</h3>
        <div id="file-list"></div>
      </div>

      <!-- Editor Area -->
      <div id="editor-area">
        <div class="toolbar">
          <strong>Code Space Editor</strong>
          <div>
            <button onclick="manualPaste()">📋 Manual Paste</button>
            <button onclick="saveAsBundle()">💾 Save as _DV Bundle</button>
          </div>
        </div>
        <div id="monaco"></div>
      </div>
    </div>

    <script>
      require.config({
        paths: {
          vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs",
        },
      });

      let editor;
      let currentFile = null;
      let files = []; // will be populated from your OUTBOX folder

      // === FAKE FILE LIST FOR NOW (replace with real folder scan in Electron later) ===
      // For testing: just drop files into OUTBOX/ next to this HTML and refresh
      function refreshFileList() {
        const listEl = document.getElementById("file-list");
        listEl.innerHTML = "";

        // Demo files - you can manually add more here or we'll make it read real files soon
        files = [
          {
            name: "noisy_chunk_1.md",
            content:
              "// Drop your bulky noisy chunk here\nprint('FloydNun energy')",
          },
          {
            name: "chat_extract_2026.txt",
            content: "Paste your chat extractor output here",
          },
          {
            name: "doc_system_piece.py",
            content: "# Your doc system piece goes here",
          },
        ];

        files.forEach((file, index) => {
          const div = document.createElement("div");
          div.className = "file-item";
          div.textContent = "📄 " + file.name;
          div.onclick = () => loadFile(index);
          listEl.appendChild(div);
        });
      }

      function loadFile(index) {
        currentFile = files[index];
        document
          .querySelectorAll(".file-item")
          .forEach((el) => el.classList.remove("active"));
        event.currentTarget.classList.add("active");

        if (!editor) {
          require(["vs/editor/editor.main"], () => {
            editor = monaco.editor.create(document.getElementById("monaco"), {
              value: currentFile.content,
              language: currentFile.name.endsWith(".py")
                ? "python"
                : currentFile.name.endsWith(".md")
                  ? "markdown"
                  : "plaintext",
              theme: "vs-dark",
              automaticLayout: true,
              fontSize: 15,
            });
            editor.focus();
          });
        } else {
          editor.setValue(currentFile.content);
          editor.focus();
        }
      }

      window.manualPaste = () => {
        if (editor) {
          navigator.clipboard
            .readText()
            .then((text) => {
              const selection = editor.getSelection();
              editor.executeEdits("paste", [
                {
                  range: selection,
                  text: text,
                  forceMoveMarkers: true,
                },
              ]);
              editor.focus();
            })
            .catch(() =>
              alert(
                "Clipboard blocked – try Ctrl+V after clicking inside editor",
              ),
            );
        }
      };

      window.saveAsBundle = () => {
        if (editor && currentFile) {
          const newContent = editor.getValue();
          const bundleName =
            currentFile.name.replace(/\.\w+$/, "") +
            "_DV_" +
            Date.now() +
            ".md";
          console.log(
            `✅ SAVED BUNDLE → ${bundleName}\nReady for virtual FS sandbox`,
          );
          alert(
            `Saved as reusable bundle:\n${bundleName}\n\n(You can now copy this into your Bundler v2)`,
          );
          // In full version this will auto-write to OUTBOX_PROCESSED/
        }
      };

      // Boot it up
      window.onload = () => {
        refreshFileList();
        // Auto-load first file
        setTimeout(() => {
          if (files.length > 0) loadFile(0);
        }, 500);
      };
    </script>
  </body>
</html>
