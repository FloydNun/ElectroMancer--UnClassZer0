<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Interface // Gemini Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e0e0e0; font-family: 'Courier New', monospace; }
        .neon-border { border: 1px solid #333; transition: all 0.3s; }
        .neon-border:focus { border-color: #00ff9d; box-shadow: 0 0 10px rgba(0, 255, 157, 0.2); outline: none; }
        .glass { background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(10px); }
        .message-user { background: #1a2e26; color: #00ff9d; align-self: flex-end; }
        .message-ai { background: #1a1a1a; color: #cfcfcf; align-self: flex-start; border-left: 2px solid #555; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #00ff9d; }
    </style>
    <!-- Import Google Generative AI Library for Browser -->
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="p-4 border-b border-gray-800 flex justify-between items-center bg-black">
        <h1 class="text-xl font-bold tracking-widest text-white">NEURAL <span class="text-green-500">INTERFACE</span></h1>
        <div class="flex gap-2">
            <input type="password" id="apiKeyInput" placeholder="Paste API Key Here" class="bg-gray-900 text-xs p-2 rounded neon-border w-64 text-white">
            <button id="saveKeyBtn" class="bg-gray-800 hover:bg-green-900 text-white text-xs px-3 py-2 rounded transition">SAVE KEY</button>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar: Configuration -->
        <aside class="w-1/4 p-4 border-r border-gray-800 bg-gray-950 flex flex-col gap-4 overflow-y-auto">
            <div>
                <label class="text-xs text-gray-500 uppercase tracking-wider">System / Persona</label>
                <textarea id="systemPrompt" rows="6" class="w-full bg-gray-900 text-sm p-3 mt-2 rounded neon-border text-gray-300 resize-none" placeholder="Define who the AI is. E.g., 'You are a neurological researcher from the year 2300 explaining concepts of harm reduction.'"></textarea>
            </div>
            
            <div>
                <label class="text-xs text-gray-500 uppercase tracking-wider">Vision Input</label>
                <div class="mt-2 border-2 border-dashed border-gray-800 rounded p-4 text-center hover:border-green-500 transition cursor-pointer relative" id="dropZone">
                    <p class="text-xs text-gray-600">Click or Drop Image</p>
                    <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                </div>
                <div id="imagePreview" class="mt-2 hidden">
                    <img id="previewImg" src="" class="w-full rounded border border-gray-700">
                    <button id="clearImg" class="text-xs text-red-500 mt-1 hover:underline">Clear Image</button>
                </div>
            </div>

            <div class="mt-auto">
                <div class="text-[10px] text-gray-600">
                    STATUS: <span id="statusIndicator" class="text-red-500">DISCONNECTED</span>
                </div>
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="flex-1 flex flex-col bg-black relative">
            <div id="chatHistory" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4 pb-20">
                <!-- Messages will appear here -->
                <div class="message-ai p-4 rounded max-w-3xl">
                    System initialized. Awaiting input.
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 bg-gray-900 border-t border-gray-800">
                <div class="flex gap-4 max-w-5xl mx-auto">
                    <textarea id="userInput" rows="2" class="flex-1 bg-black text-white p-3 rounded neon-border resize-none" placeholder="Enter command or query..."></textarea>
                    <button id="sendBtn" class="bg-green-700 hover:bg-green-600 text-white font-bold py-2 px-6 rounded transition shadow-[0_0_15px_rgba(0,255,0,0.2)]">
                        SEND
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');
        const chatHistory = document.getElementById('chatHistory');
        const systemPrompt = document.getElementById('systemPrompt');
        const statusIndicator = document.getElementById('statusIndicator');
        const imageInput = document.getElementById('imageInput');
        const previewImg = document.getElementById('previewImg');
        const imagePreviewDiv = document.getElementById('imagePreview');
        const clearImgBtn = document.getElementById('clearImg');

        let genAI = null;
        let model = null;
        let currentImageBase64 = null;

        // Load Key
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) {
            apiKeyInput.value = savedKey;
            initializeAI(savedKey);
        }

        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                initializeAI(key);
            }
        });

        function initializeAI(key) {
            try {
                genAI = new GoogleGenerativeAI(key);
                model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" }); // Use Flash for speed, or Pro for depth
                statusIndicator.innerText = "ONLINE // READY";
                statusIndicator.classList.remove('text-red-500');
                statusIndicator.classList.add('text-green-500');
            } catch (e) {
                alert("Error initializing AI: " + e.message);
            }
        }

        // Image Handling
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onloadend = () => {
                currentImageBase64 = reader.result.split(',')[1];
                previewImg.src = reader.result;
                imagePreviewDiv.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        });

        clearImgBtn.addEventListener('click', () => {
            currentImageBase64 = null;
            imageInput.value = '';
            imagePreviewDiv.classList.add('hidden');
        });

        // Sending Messages
        async function sendMessage() {
            if (!model) { alert("Please enter and save API Key first."); return; }
            
            const text = userInput.value.trim();
            if (!text && !currentImageBase64) return;

            // UI Update
            appendMessage(text, 'user');
            userInput.value = '';
            
            const loadingMsg = appendMessage("Processing...", 'ai');

            try {
                let result;
                const sysPrompt = systemPrompt.value.trim() ? "SYSTEM: " + systemPrompt.value + "\n\n" : "";
                
                if (currentImageBase64) {
                    // Vision Request
                    const imagePart = {
                        inlineData: {
                            data: currentImageBase64,
                            mimeType: "image/jpeg"
                        }
                    };
                    result = await model.generateContent([sysPrompt + text, imagePart]);
                } else {
                    // Text Only
                    result = await model.generateContent(sysPrompt + text);
                }

                const response = await result.response;
                const markdown = response.text();
                
                chatHistory.removeChild(loadingMsg);
                appendMessage(markdown, 'ai');

            } catch (error) {
                chatHistory.removeChild(loadingMsg);
                appendMessage("ERROR: " + error.message, 'ai');
            }
        }

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'message-user p-4 rounded max-w-3xl mb-4' : 'message-ai p-4 rounded max-w-3xl mb-4';
            
            // Simple markdown formatting (bold/newlines)
            let formatted = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
                
            div.innerHTML = formatted;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return div;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
