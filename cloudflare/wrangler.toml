name = "electromancer-worker"
main = "worker.js"
compatibility_date = "2024-01-01"

# ── Environment variables ──────────────────────────────────────
# Set GITHUB_TOKEN in the Cloudflare dashboard (or via `wrangler secret put GITHUB_TOKEN`)
# for the GitHub Models AI proxy endpoint to work.
#
# [vars]
# GITHUB_TOKEN = "ghp_..."   # <-- do NOT commit real tokens here

# ── Local development ──────────────────────────────────────────
# wrangler dev reads .dev.vars for secrets during local development.
# Create a .dev.vars file (gitignored) with:
#   GITHUB_TOKEN=ghp_your_token_here

# ── Routes (update with your Cloudflare zone) ──────────────────
# routes = [
#   { pattern = "yourdomain.com/api/*", zone_name = "yourdomain.com" }
# ]

# ── Cloudflare Pages (alternative deployment) ──────────────────
# Use `wrangler pages deploy dist --project-name electromancer`
# from the react-cloudflare-app directory instead.
